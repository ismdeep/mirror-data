name: Update Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: '24 0 * * *'
  workflow_dispatch:
    inputs:
      all-pages:
        description: Check all pages for every repository
        type: boolean
        default: false
        required: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      ALL_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.all-pages || false }}

    steps:

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install rclone
        run: sudo make install-rclone

      - name: Build
        run: make bin

      - name: Prepare secrets
        run: echo "${{ secrets.SECRETS_YAML }}" > secrets.yaml

      - name: Run mirror-data
        run: ./bin/data --meta _meta.yaml --secrets secrets.yaml --all-pages="${ALL_PAGES}"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ismdeep
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push back
        if: env.BRANCH_NAME == 'main'
        run: make publish
